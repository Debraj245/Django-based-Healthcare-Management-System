{% extends 'core/base.html' %}
{% block title %}Login - MediCare{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>🔐 Login to MediCare</h2>
        <p class="auth-sub">Access your appointments and health services</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</div>
{% endblock %}
